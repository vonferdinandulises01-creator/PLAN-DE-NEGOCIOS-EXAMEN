<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CERTIFICACIÓN: PLAN DE NEGOCIOS</title>
    <style>
        :root { --uvm: #c41e3a; --bg: #0d1117; --card: #161b22; --blue: #58a6ff; }
        body { background: var(--bg); color: #c9d1d9; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 850px; margin: 40px auto; background: var(--card); padding: 30px; border-radius: 12px; border: 1px solid #30363d; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .planteamiento { background: #0d1117; padding: 25px; border-left: 5px solid var(--uvm); margin-bottom: 20px; line-height: 1.8; color: #f0f6fc; }
        .option { background: #21262d; border: 1px solid #30363d; padding: 18px; margin: 10px 0; cursor: pointer; border-radius: 8px; transition: 0.2s; }
        .option:hover { border-color: var(--blue); background: #2d333b; transform: translateX(5px); }
        .hidden { display: none !important; }
        input { width: 100%; padding: 15px; margin-bottom: 20px; border-radius: 6px; border: 1px solid #30363d; background: #0d1117; color: white; font-size: 16px; box-sizing: border-box; }
        .btn { background: var(--uvm); color: white; border: none; padding: 20px; width: 100%; cursor: pointer; border-radius: 8px; font-weight: bold; font-size: 18px; text-transform: uppercase; }
        #timer-bar { height: 6px; background: var(--blue); width: 100%; position: fixed; top: 0; left: 0; transition: width 1s linear; }
    </style>
</head>
<body>

<div id="timer-bar"></div>

<div id="p-reg" class="container">
    <h2 style="color:var(--uvm); text-align:center;">CERTIFICACIÓN PROFESIONAL<br>PLAN DE NEGOCIOS INTERNACIONALES</h2>
    <p style="text-align:center; opacity:0.7;">Sede: Texcoco | Ciclo: C1-2026</p>
    <input type="text" id="nom" placeholder="Nombre Completo del Candidato">
    <input type="text" id="mat" placeholder="Matrícula Institucional">
    <button class="btn" onclick="iniciarExamen()">Iniciar Certificación</button>
</div>

<div id="p-exam" class="container hidden">
    <div id="clock" style="text-align:right; font-weight:bold; color:var(--uvm); margin-bottom:15px; font-size:1.2em;">60:00</div>
    <div id="content"></div>
</div>

<div id="p-rev" class="container hidden">
    <h2 style="text-align:center; color:var(--uvm);">INFORME DE DESEMPEÑO</h2>
    <div style="text-align:center; font-size: 4em; font-weight:bold;" id="score-display">0.0</div>
    <p style="text-align:center;">Calificación Final enviada a base de datos.</p>
    <hr style="border:0; border-top:1px solid #333; margin:20px 0;">
    <div id="rev-lista"></div>
</div>

<script>
    const bancoDefinitivo = [
        { p: "CASO 1: Diagnóstico profundo PESTEL y Gap de Mercado...", q: "¿Qué premisas garantizan una cimentación sólida?", o: ["a) 1, 2, 4", "b) 2, 3, 5", "c) 3, 5, 6"], r: 0 },
        { p: "CASO 2: Riesgo de Relevancia y validación de inversión...", q: "¿Qué conjunto de factores valida la relevancia?", o: ["a) 2, 3, 5", "b) 1, 4, 6", "c) 3, 4, 5"], r: 1 },
        { p: "CASO 3: Coherencia entre diseño organizacional y diagnóstico...", q: "¿Qué elementos aseguran la coherencia?", o: ["a) 1, 4, 6", "b) 2, 3, 5", "c) 4, 5, 6"], r: 1 },
        { p: "CASO 4: Identificación de Early Adopters globales...", q: "¿Qué define al segmento de validación?", o: ["a) 1, 5, 6", "b) 2, 3, 4", "c) 3, 4, 6"], r: 0 },
        { p: "CASO 5: Línea Base en Fase 0 con Gemini...", q: "¿Qué requisitos otorgan validez técnica?", o: ["a) 1, 3, 6", "b) 2, 4, 5", "c) 3, 5, 6"], r: 1 },
        { p: "CASO 6: Plan de Comunicación y adaptación cultural...", q: "¿Cuáles son los pilares efectivos?", o: ["a) 1, 2, 5", "b) 2, 4, 5", "c) 2, 4, 6"], r: 2 },
        { p: "CASO 7: Selección de Canales B2B/B2C y E-com...", q: "¿Qué determina el éxito de la distribución?", o: ["a) 1, 2, 6", "b) 3, 4, 5", "c) 2, 5, 6"], r: 0 },
        { p: "CASO 8: Red de Socios Clave para mitigar riesgo de entrada...", q: "¿Qué roles desempeñan los socios?", o: ["a) 1, 3, 4", "b) 1, 3, 6", "c) 2, 3, 5, 6"], r: 2 },
        { p: "CASO 9: Vehículos Jurídicos (Licencias, Franquicias, Consorcios)...", q: "¿Qué vehículos minimizan el impacto financiero?", o: ["a) 1, 3, 4", "b) 2, 4, 5", "c) 3, 5, 6"], r: 0 },
        { p: "CASO 10: Protocolo de Bloqueo Secuencial Nivel 5...", q: "¿Cuáles son las reglas de seguridad?", o: ["a) 1, 4, 5", "b) 2, 3, 4, 5", "c) 4, 5, 6"], r: 1 },
        { p: "CASO 11: Ingeniería de Producto y Normas de Etiquetado...", q: "¿Qué factor es crítico en la arquitectura técnica?", o: ["a) Normas técnicas y certificaciones", "b) Solo diseño", "c) Precio origen"], r: 0 },
        { p: "CASO 12: Resiliencia en Logística (Bloqueo de Canal)...", q: "¿Cuál es la acción de mitigación estratégica?", o: ["a) Cancelar", "b) Rutas multimodales y stock", "c) Esperar"], r: 1 },
        { p: "CASO 13: Negociación Internacional y Estilo Bicultural...", q: "¿Qué táctica asegura un acuerdo exitoso?", o: ["a) Forzar cierre", "b) Confianza y protocolos", "c) Indiferencia"], r: 1 },
        { p: "CASO 14: Sostenibilidad Ética y Trazabilidad de Origen...", q: "¿Qué acción valida la fase de Integridad?", o: ["a) Sustituir proveedor sin trazabilidad", "b) Ignorar costos", "c) Mentir"], r: 0 },
        { p: "CASO 15: Viabilidad Financiera y Aranceles Imprevistos...", q: "¿Qué falló en el análisis Drill-down?", o: ["a) Impuestos de importación", "b) Visión", "c) Logo"], r: 0 },
        { p: "CASO 16: Gobernanza Global y Control de Calidad Remoto...", q: "¿Qué herramienta asegura el cumplimiento?", o: ["a) Descentralización", "b) KPIs en tiempo real", "c) Confianza absoluta"], r: 1 },
        { p: "CASO 17: Estructura de Matriz y Empowerment Local...", q: "¿Cuál es el modelo óptimo de decisión?", o: ["a) Centralización", "b) Descentralización facultada", "c) Consultoría externa"], r: 1 },
        { p: "CASO 18: Inteligencia de Mercado y Fuentes Oficiales...", q: "¿Por qué Gemini daría Semáforo Rojo?", o: ["a) Falta de fuentes oficiales/Cámaras", "b) Reporte largo", "c) Wikipedia"], r: 0 },
        { p: "CASO 19: Validación de Tracción y Segmento Meta...", q: "¿Qué riesgo técnico hay en la validación?", o: ["a) Sesgo de datos (Risk-Execution)", "b) Ninguno", "c) Éxito"], r: 0 },
        { p: "CASO 20: Seguridad Auditoría y Procesamiento Secuencial...", q: "¿Qué sucede con la carga masiva de prompts?", o: ["a) Bloqueo de sistema", "b) Premio", "c) Nada"], r: 0 },
        { p: "CASO 21: Alianza de Capital y Shareholders Agreement...", q: "¿Qué documento prevé disputas de marca?", o: ["a) Acuerdo de accionistas", "b) Factura", "c) Folleto"], r: 0 },
        { p: "CASO 22: Logística Inversa y Daños en Transporte...", q: "¿Qué elemento de la Fase 7 falló?", o: ["a) Embalaje y seguros", "b) Precio", "c) Misión"], r: 0 },
        { p: "CASO 23: Responsabilidad Social y Licencia Social...", q: "¿Qué principio se está violando?", o: ["a) Legitimidad local", "b) Rentabilidad", "c) Estética"], r: 0 },
        { p: "CASO 24: Ruta de Éxito y Diagnóstico PESTEL Previo...", q: "¿Por qué aumenta el riesgo de fracaso?", o: ["a) Inversión sin validar entorno", "b) Mejor comprar", "c) Activos siempre"], r: 0 },
        { p: "CASO 25: Auditoría Final y Veredicto Técnico...", q: "¿Cuál es el veredicto por falta de cimentación?", o: ["a) Rechazo técnico", "b) Aprobación diseño", "c) Pase automático"], r: 0 }
    ];

    let currentIndex = 0, score = 0, userAnswers = [], qTimer, isProcessing = false;

    function iniciarExamen() {
        const n = document.getElementById('nom').value, m = document.getElementById('mat').value;
        if(n.length < 5 || m.length < 3) return alert("Ingrese identificación válida.");
        document.getElementById('p-reg').classList.add('hidden');
        document.getElementById('p-exam').classList.remove('hidden');
        render();
    }

    function render() {
        if(currentIndex >= bancoDefinitivo.length) return finish();
        isProcessing = false;
        clearInterval(qTimer);
        let qTime = 80;
        document.getElementById('timer-bar').style.width = "100%";
        qTimer = setInterval(() => {
            qTime--;
            document.getElementById('timer-bar').style.width = (qTime/80)*100 + "%";
            if(qTime <= 0) saveAns(-1);
        }, 1000);

        const item = bancoDefinitivo[currentIndex];
        document.getElementById('content').innerHTML = `
            <div class="planteamiento"><b>REACTIVO ${currentIndex + 1}:</b><br>${item.p}</div>
            <h3 style="color:#fff;">${item.q}</h3>
            ${item.o.map((opt, i) => `<div class="option" onclick="saveAns(${i})">${opt}</div>`).join('')}
        `;
    }

    function saveAns(idx) {
        if(isProcessing) return;
        isProcessing = true;
        const correct = (idx === bancoDefinitivo[currentIndex].r);
        userAnswers.push(correct);
        if(correct) score++;
        currentIndex++;
        render();
    }

    function finish() {
        const nota = ((score / 25) * 10).toFixed(2);
        const n = document.getElementById('nom').value, m = document.getElementById('mat').value;
        
        // ENVÍO A GOOGLE FORMS
        const formURL = "https://docs.google.com/forms/d/e/1FAIpQLSdFBOwuPUjxnZdqSy-4YItdhe8lt5naeYaSoROCsZaMPhgkUw/formResponse";
        const data = new URLSearchParams();
        data.append("entry.2005620554", n);
        data.append("entry.1045792443", m);
        data.append("entry.1065046570", nota);
        data.append("entry.1166974658", "Sede Texcoco - Certificación PNI");

        fetch(formURL, { method: 'POST', mode: 'no-cors', body: data });

        document.getElementById('score-display').innerText = nota;
        document.getElementById('p-exam').classList.add('hidden');
        document.getElementById('p-rev').classList.remove('hidden');
        
        let h = "";
        bancoDefinitivo.forEach((p, i) => { if(!userAnswers[i]) h += `<div style="padding:15px; border-bottom:1px solid #333;"><b>FALLO EN REACTIVO ${i+1}:</b><br>${p.p}</div>`; });
        document.getElementById('rev-lista').innerHTML = h || "<h3>CERTIFICACIÓN PERFECTA</h3>";
    }
</script>
</body>
</html>
