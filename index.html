<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CERTIFICACIÓN PROFESIONAL: PLAN DE NEGOCIOS INTERNACIONALES</title>
    <style>
        :root { --uvm: #c41e3a; --bg: #0d1117; --card: #161b22; --blue: #58a6ff; }
        body { background: var(--bg); color: #c9d1d9; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; user-select: none; -webkit-user-select: none; }
        .container { max-width: 900px; margin: 20px auto; background: var(--card); padding: 40px; border-radius: 12px; border: 1px solid #30363d; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .timer-bar { height: 8px; background: var(--blue); width: 100%; position: fixed; top: 0; left: 0; transition: width 1s linear; }
        .planteamiento { background: #0d1117; padding: 25px; border-left: 5px solid var(--uvm); margin-bottom: 25px; line-height: 1.8; text-align: justify; }
        .option { background: #21262d; border: 1px solid #30363d; padding: 20px; margin: 12px 0; cursor: pointer; border-radius: 8px; transition: 0.2s; }
        .option:hover { border-color: var(--blue); background: #2d333b; transform: translateX(8px); }
        .hidden { display: none !important; }
        input { width: 100%; padding: 18px; margin-bottom: 25px; border-radius: 6px; border: 1px solid #30363d; background: #0d1117; color: white; box-sizing: border-box; }
        .btn { background: var(--uvm); color: white; border: none; padding: 20px; width: 100%; cursor: pointer; border-radius: 8px; font-weight: bold; text-transform: uppercase; }
        .err-card { border: 1px solid #da3633; padding: 15px; margin-top: 10px; border-radius: 8px; background: #1a0a0a; font-size: 0.9em; }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="timer-bar" id="t-bar"></div>

<div id="p-reg" class="container">
    <h2 style="color:var(--uvm); text-align:center;">EXAMEN CERTIFICACIÓN PNI 2026</h2>
    <input type="text" id="nom" placeholder="Nombre Completo">
    <input type="text" id="mat" placeholder="Matrícula">
    <button class="btn" onclick="iniciar()">Iniciar Evaluación</button>
</div>

<div id="p-exam" class="container hidden">
    <div id="clock" style="text-align:right; font-weight:bold; color:var(--uvm);">80s</div>
    <div id="content"></div>
</div>

<div id="p-rev" class="container hidden">
    <h2 style="text-align:center; color:var(--uvm);">AUDITORÍA FINALIZADA</h2>
    <h1 style="text-align:center;" id="score-val">0.0</h1>
    <div id="err-list"></div>
</div>

<script>
    const banco = [
        {
            p: "CASO 1: Una empresa manufacturera en Texcoco desea exportar cosméticos orgánicos a la Unión Europea. Tras un análisis PESTEL, se identifica que el 'Gap de Mercado' es la falta de certificaciones 'Cruelty Free' en el segmento premium. Se requiere que el diagnóstico demuestre lógica técnica para obtener el Semáforo Verde del auditor antes del lunes. El equipo técnico debe decidir qué factor es el más crítico para mitigar el riesgo de entrada legal en el país destino.",
            q: "¿Qué premisa garantiza una cimentación estratégica sólida?",
            o: ["Análisis PESTEL y validación del Gap de Mercado.", "Diseño visual del MVP sin validación.", "Inversión en marketing antes de diagnóstico."],
            r: 0
        },
        // ... (Repetir esta estructura hasta el 25 con casos de Logística, Incoterms, Aranceles y Selección de Canales)
    ];

    // Lógica para generar los 25 reactivos únicos de PNI
    const temas = ["Incoterms 2020", "Análisis PESTEL", "Arquitectura de Valor", "Estrategia Trendsetter", "Early Adopters", "Validación de Tracción", "Riesgo de Relevancia", "Benchmarking", "Canales B2B", "Vehículos Jurídicos", "Protocolo Empresarial", "Fase 0 Gemini", "Mitigación de Riesgos", "Margen de Contribución Exportable", "Certificaciones ISO", "Cultura de Negocios", "Joint Ventures", "Logística Internacional", "Aduanas", "Propiedad Intelectual", "Contratos Internacionales", "Formas de Pago", "Marketing Bicultural", "Sostenibilidad", "Auditoría de Procesos"];

    if(banco.length < 25) {
        for(let i = 1; i < 25; i++) {
            banco.push({
                p: `CASO ${i+1}: Durante la auditoría de la fase de ${temas[i]}, el equipo de internacionalización debe evaluar la viabilidad del proyecto. Se ha detectado que el plan carece de un análisis de riesgos operativo frente a fluctuaciones cambiarias y arancelarias. El consultor exige que se presente un sustento técnico que vincule el diseño organizacional con el diagnóstico previo del mercado meta, asegurando que el modelo no sea genérico y responda a la agilidad que el mercado global exige hoy en día.`,
                q: `¿Cuál es el factor determinante para la acreditación técnica en el tema de ${temas[i]}?`,
                o: ["Coherencia entre diagnóstico y diseño.", "Aumentar el presupuesto publicitario.", "Ignorar las barreras no arancelarias."],
                r: 0
            });
        }
    }

    let cur = 0, pts = 0, history = [], qTime = 80, timer;

    // BLINDAJE
    document.onkeydown = function(e) {
        if(e.keyCode == 123 || (e.ctrlKey && (e.keyCode == 67 || e.keyCode == 85 || e.keyCode == 73)) || e.keyCode == 44) return false;
    };

    function iniciar() {
        if(document.getElementById('nom').value.length < 5) return alert("Nombre requerido");
        document.getElementById('p-reg').classList.add('hidden');
        document.getElementById('p-exam').classList.remove('hidden');
        render();
    }

    function render() {
        if(cur >= 25) return finish();
        clearInterval(timer);
        qTime = 80;
        document.getElementById('t-bar').style.width = "100%";
        timer = setInterval(() => {
            qTime--;
            document.getElementById('clock').innerText = qTime + "s";
            document.getElementById('t-bar').style.width = (qTime/80)*100 + "%";
            if(qTime <= 0) ans(null);
        }, 1000);

        const item = banco[cur];
        document.getElementById('content').innerHTML = `
            <div class="planteamiento"><strong>REACTIVO ${cur+1}:</strong><br>${item.p}</div>
            <h3 style="color:#fff;">${item.q}</h3>
            ${item.o.map((opt, i) => `<div class="option" onclick="ans(${i})">${opt}</div>`).join('')}
        `;
    }

    function ans(i) {
        const correct = (i === banco[cur].r);
        if(correct) pts++;
        history.push({ case: cur+1, ok: correct, txt: banco[cur].p });
        cur++;
        render();
    }

    function finish() {
        const final = ((pts / 25) * 10).toFixed(2);
        document.getElementById('p-exam').classList.add('hidden');
        document.getElementById('p-rev').classList.remove('hidden');
        document.getElementById('score-val').innerText = final;

        let errs = "";
        history.forEach(h => {
            if(!h.ok) errs += `<div class="err-card"><strong>FALLO EN REACTIVO ${h.case}:</strong><br>${h.txt}</div>`;
        });
        document.getElementById('err-list').innerHTML = errs || "<h3>CALIFICACIÓN PERFECTA</h3>";

        // ENVÍO A FORMS (Usa tus entry IDs específicos)
        const data = new FormData();
        data.append("entry.2005620554", document.getElementById('nom').value);
        data.append("entry.1045792443", document.getElementById('mat').value);
        data.append("entry.1065046570", final);

        fetch("https://docs.google.com/forms/d/e/1FAIpQLSdFBOwuPUjxnZdqSy-4YItdhe8lt5naeYaSoROCsZaMPhgkUw/formResponse", {
            method: 'POST', mode: 'no-cors', body: data
        });
    }
</script>
</body>
</html>
