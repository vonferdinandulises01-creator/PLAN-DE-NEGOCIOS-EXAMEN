<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CERTIFICACIÓN PROFESIONAL: PLAN DE NEGOCIOS INTERNACIONALES</title>
    <style>
        :root { --uvm: #c41e3a; --bg: #0d1117; --card: #161b22; --blue: #58a6ff; }
        body { background: var(--bg); color: #c9d1d9; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; user-select: none; -webkit-user-select: none; }
        #examen-container { max-width: 900px; margin: auto; background: var(--card); padding: 30px; border-radius: 12px; border: 1px solid #30363d; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .timer-box { position: sticky; top: 0; background: var(--uvm); color: white; padding: 10px; text-align: center; font-weight: bold; border-radius: 5px; margin-bottom: 20px; z-index: 100; }
        .planteamiento { background: #0d1117; padding: 25px; border-left: 5px solid var(--uvm); margin-bottom: 20px; line-height: 1.8; text-align: justify; }
        .option { display: block; background: #21262d; border: 1px solid #30363d; padding: 15px; margin: 10px 0; cursor: pointer; border-radius: 8px; transition: 0.2s; }
        .option:hover { border-color: var(--blue); background: #2d333b; transform: translateX(5px); }
        .hidden { display: none !important; }
        input { width: 100%; padding: 15px; margin-bottom: 20px; border-radius: 6px; border: 1px solid #30363d; background: #0d1117; color: white; box-sizing: border-box; }
        .btn { background: var(--uvm); color: white; border: none; padding: 20px; width: 100%; cursor: pointer; border-radius: 8px; font-weight: bold; text-transform: uppercase; }
        #watermark { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-45deg); font-size: 5vw; opacity: 0.05; pointer-events: none; z-index: 1000; }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="watermark">AUDITORÍA PNI 2026</div>

<div id="examen-container">
    <div id="timer-display" class="timer-box hidden">Tiempo restante: 80s</div>

    <div id="identificacion">
        <h2 style="color:var(--uvm); text-align:center;">PLAN DE NEGOCIOS INTERNACIONALES<br>EXAMEN DE CERTIFICACIÓN</h2>
        <input type="text" id="nombreAlumno" placeholder="Nombre Completo del Candidato">
        <input type="text" id="matriculaAlumno" placeholder="Matrícula">
        <button class="btn" onclick="comenzarExamen()">Iniciar Sesión y Evaluación</button>
    </div>

    <div id="preguntas-area" class="hidden">
        <div id="render-pregunta"></div>
    </div>

    <div id="resultado-final" class="hidden">
        <h2 style="color:var(--uvm);">Evaluación Concluida</h2>
        <div id="resumen-puntos"></div>
        <p style="text-align:center;">La información ha sido enviada a la base de datos institucional.</p>
    </div>
</div>

<script>
    const bancoPreguntas = [
        {
            p: "CASO 1: Un equipo emprendedor desea internacionalizar un modelo innovador ('Trendsetter'). Realizan un diagnóstico PESTEL para identificar el 'Gap de Mercado' en el país destino.",
            q: "¿Qué premisas garantizan una cimentación estratégica sólida?",
            o: ["a) Análisis PESTEL, Gap de Mercado y Macrotendencias", "b) Diagnóstico opcional basado en corazonadas", "c) Solo estudio de competencia directa"],
            r: 0
        },
        {
            p: "CASO 2: El Consultor evalúa el 'Riesgo de Relevancia' para validar si el problema justifica inversión masiva.",
            q: "¿Qué conjunto de factores valida la relevancia técnica?",
            o: ["a) Datos PESTEL sólidos de fuentes reales y validación del Gap", "b) Opiniones en redes sociales", "c) Atractivo visual del MVP"],
            r: 0
        },
        // ... (Aquí van los 25 reactivos siguiendo el orden de Plan de Negocios Internacionales)
        {
            p: "CASO 25: Auditoría final de procesos ante patrones de automatización masiva.",
            q: "¿Qué normas rigen la interacción con la auditoría?",
            o: ["a) Análisis secuencial fase por fase", "b) Carga masiva de datos", "c) Uso de reportes genéricos"],
            r: 0
        }
    ];

    // Relleno de seguridad para asegurar que corran los 25 reactivos
    if(bancoPreguntas.length < 25) {
        for(let i = bancoPreguntas.length; i < 25; i++) {
            bancoPreguntas.push({
                p: `CASO ${i+1}: Análisis de variables críticas en el Plan de Negocios Internacionales, considerando logística, aranceles e inteligencia de mercado.`,
                q: "¿Qué factor asegura la viabilidad de entrada al mercado?",
                o: ["Estrategia adaptada al entorno local", "Mantener el modelo nacional sin cambios", "Ignorar las barreras no arancelarias"],
                r: 0
            });
        }
    }

    let indice = 0;
    let score = 0;
    let tiempo = 80;
    let reloj;

    function comenzarExamen() {
        if(document.getElementById('nombreAlumno').value.length < 5) return alert("Ingrese nombre completo.");
        document.getElementById('identificacion').classList.add('hidden');
        document.getElementById('preguntas-area').classList.remove('hidden');
        document.getElementById('timer-display').classList.remove('hidden');
        mostrar();
    }

    function mostrar() {
        if(indice >= bancoPreguntas.length) return finalizar();
        
        tiempo = 80;
        clearInterval(reloj);
        reloj = setInterval(() => {
            tiempo--;
            document.getElementById('timer-display').innerText = `Tiempo restante: ${tiempo}s`;
            if(tiempo <= 0) responder(null);
        }, 1000);

        const item = bancoPreguntas[indice];
        document.getElementById('render-pregunta').innerHTML = `
            <div class="planteamiento">
                <p><strong>REACTIVO ${indice + 1} DE 25</strong></p>
                <p>${item.p}</p>
                <p><strong>${item.q}</strong></p>
            </div>
            ${item.o.map((op, i) => `<div class="option" onclick="responder(${i})">${op}</div>`).join('')}
        `;
    }

    function responder(op) {
        if(op === bancoPreguntas[indice].r) score++;
        indice++;
        mostrar();
    }

    function finalizar() {
        clearInterval(reloj);
        document.getElementById('preguntas-area').classList.add('hidden');
        document.getElementById('timer-display').classList.add('hidden');
        document.getElementById('resultado-final').classList.remove('hidden');
        
        const nota = ((score / 25) * 10).toFixed(2);
        document.getElementById('resumen-puntos').innerHTML = `<h3>Calificación: ${nota}/10.0</h3>`;

        // ENVÍO A FORMS
        const nom = document.getElementById('nombreAlumno').value;
        const mat = document.getElementById('matriculaAlumno').value;
        const G_FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLSdFBOwuPUjxnZdqSy-4YItdhe8lt5naeYaSoROCsZaMPhgkUw/formResponse";
        
        const formData = new FormData();
        formData.append("entry.2005620554", nom);
        formData.append("entry.1045792443", mat);
        formData.append("entry.1065046570", nota);

        fetch(G_FORM_URL, { method: "POST", mode: "no-cors", body: formData });
    }
</script>
</body>
</html>
