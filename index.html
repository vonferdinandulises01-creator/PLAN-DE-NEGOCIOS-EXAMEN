<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Examen Ingeniería de Negocios - Blindaje Nivel EGEL PLUS</title>
    <style>
        /* Estilo para evitar selección de texto */
        body {
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            padding: 20px;
        }
        #examen-container {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .timer-box {
            position: sticky;
            top: 0;
            background: #d9534f;
            color: white;
            padding: 10px;
            text-align: center;
            font-weight: bold;
            font-size: 1.2em;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        .reactivo {
            display: none; /* Se muestran uno por uno */
            line-height: 1.6;
        }
        .reactivo.activo { display: block; }
        .opcion {
            display: block;
            margin: 10px 0;
            padding: 10px;
            border: 1px solid #ddd;
            cursor: pointer;
            border-radius: 4px;
        }
        .opcion:hover { background: #f0f0f0; }
        .error-msg { color: #a94442; font-weight: bold; }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="examen-container">
    <div class="timer-box" id="timer">Tiempo restante: 80s</div>
    
    <div id="identificacion">
        <h2>Registro de Examen</h2>
        <input type="text" id="nombreAlumno" placeholder="Nombre Completo" style="width:90%; padding:10px; margin-bottom:10px;"><br>
        <input type="text" id="matriculaAlumno" placeholder="Matrícula" style="width:90%; padding:10px;"><br><br>
        <button onclick="comenzarExamen()" style="padding:10px 20px; cursor:pointer;">Iniciar Evaluación</button>
    </div>

    <div id="preguntas-area" style="display:none;">
        <div id="render-pregunta"></div>
    </div>

    <div id="resultado-final" style="display:none;">
        <h2>Evaluación Finalizada</h2>
        <div id="lista-errores"></div>
        <p>Sus respuestas han sido enviadas al sistema central.</p>
    </div>
</div>

<script>
    // 1. CONFIGURACIÓN DE REACTIVOS (Extensión mínima 6 renglones)
    const bancoPreguntas = [
        {
            caso: "La empresa manufacturera 'Global Beauty', ubicada en la zona industrial de Texcoco, enfrenta un desafío crítico en su cadena de suministro tras la implementación de un nuevo modelo de Ingeniería de Negocios. El director de operaciones ha notado que, a pesar de tener un plan de negocios alineado a la metodología Wadhwani, la inactividad en los nodos de distribución está afectando el flujo de caja operativo de manera severa. Se requiere una intervención inmediata antes de la firma de actas del próximo lunes para evitar una crisis de liquidez. El equipo técnico debe decidir qué herramienta de diagnóstico es la más adecuada para identificar el cuello de botella sin detener la producción actual.",
            opciones: ["Análisis de ruta crítica (CPM)", "Diagrama de Ishikawa", "Simulación Monte Carlo", "Balanced Scorecard"],
            correcta: 0
        },
        // Aquí agregarías los otros 24 reactivos con la misma estructura
    ];

    let indicePregunta = 0;
    let tiempoRestante = 80;
    let cronometro;
    let respuestasUsuario = [];

    // 2. BLINDAJE ANTICOPIADO Y CAPTURA
    document.onkeydown = function(e) {
        // Bloquea F12, Ctrl+Shift+I, Ctrl+U, Ctrl+C, Ctrl+S (Screenshot)
        if (e.keyCode == 123 || (e.ctrlKey && (e.shiftKey && e.keyCode == 73)) || (e.ctrlKey && e.keyCode == 85) || (e.ctrlKey && e.keyCode == 67) || (e.keyCode == 44)) {
            alert("Acción no permitida: Blindaje Activo.");
            return false;
        }
    };

    // Detectar si el usuario cambia de pestaña
    document.addEventListener("visibilitychange", () => {
        if (document.hidden) {
            alert("Alerta: Se ha detectado salida de la pantalla. El intento será reportado.");
        }
    });

    // 3. LÓGICA DEL EXAMEN
    function comenzarExamen() {
        if(!document.getElementById('nombreAlumno').value) return alert("Ingresa tu nombre");
        document.getElementById('identificacion').style.display = 'none';
        document.getElementById('preguntas-area').style.display = 'block';
        mostrarPregunta();
    }

    function mostrarPregunta() {
        if(indicePregunta >= bancoPreguntas.length) {
            finalizarExamen();
            return;
        }
        
        reiniciarReloj();
        const p = bancoPreguntas[indicePregunta];
        let html = `<p><strong>Reactivo ${indicePregunta + 1}:</strong></p>
                    <p style="text-align:justify;">${p.caso}</p>`;
        
        p.opciones.forEach((op, i) => {
            html += `<div class="opcion" onclick="registrarRespuesta(${i})">${op}</div>`;
        });
        
        document.getElementById('render-pregunta').innerHTML = html;
    }

    function reiniciarReloj() {
        clearInterval(cronometro);
        tiempoRestante = 80;
        document.getElementById('timer').innerText = `Tiempo restante: ${tiempoRestante}s`;
        
        cronometro = setInterval(() => {
            tiempoRestante--;
            document.getElementById('timer').innerText = `Tiempo restante: ${tiempoRestante}s`;
            if(tiempoRestante <= 0) {
                registrarRespuesta(null); // Salta por tiempo agotado
            }
        }, 1000);
    }

    function registrarRespuesta(seleccion) {
        respuestasUsuario.push(seleccion);
        indicePregunta++;
        mostrarPregunta();
    }

    // 4. ENVÍO DE DATOS A GOOGLE FORMS
    function finalizarExamen() {
        clearInterval(cronometro);
        document.getElementById('preguntas-area').style.display = 'none';
        document.getElementById('resultado-final').style.display = 'block';

        let correctas = 0;
        let erroresHTML = "<ul>";
        
        respuestasUsuario.forEach((res, i) => {
            if(res === bancoPreguntas[i].correcta) {
                correctas++;
            } else {
                // Solo muestra que estuvo mal, no la respuesta
                erroresHTML += `<li class="error-msg">Reactivo ${i+1}: Incorrecto</li>`;
            }
        });
        erroresHTML += "</ul>";
        document.getElementById('lista-errores').innerHTML = `<h3>Resultado: ${correctas}/${bancoPreguntas.length}</h3>` + erroresHTML;

        // --- ENVIAR A GOOGLE FORMS ---
        const nombre = document.getElementById('nombreAlumno').value;
        const matricula = document.getElementById('matriculaAlumno').value;
        
        // REEMPLAZAR CON TUS ENTRY IDs
        const G_FORM_URL = "https://docs.google.com/forms/d/e/TU_ID_AQUI/formResponse";
        const formData = new FormData();
        formData.append("entry.1111111", nombre);    // ID para nombre
        formData.append("entry.2222222", matricula); // ID para matrícula
        formData.append("entry.3333333", correctas); // ID para calificación final

        fetch(G_FORM_URL, {
            method: "POST",
            mode: "no-cors",
            body: formData
        }).then(() => console.log("Datos enviados"));
    }
</script>
</body>
</html>
